<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DigiMarket | Premium Digital Marketplace</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #071212;
      font-family: 'Inter', sans-serif;
      color: #eef5f2;
      scroll-behavior: smooth;
    }

    /* Modern scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1e1e; }
    ::-webkit-scrollbar-thumb { background: #2b8c5e; border-radius: 10px; }

    /* Glassmorphic navbar */
    .navbar {
      backdrop-filter: blur(16px);
      background: rgba(10, 25, 23, 0.85);
      border-bottom: 1px solid rgba(43, 140, 94, 0.3);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #5ce0a2, #2b8c5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo i { margin-right: 6px; color: #2b8c5e; background: none; -webkit-background-clip: unset; background-clip: unset; }
    .nav-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .nav-group button {
      background: rgba(43, 140, 94, 0.2);
      border: 1px solid rgba(43, 140, 94, 0.5);
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .nav-group button:hover {
      background: #2b8c5e;
      transform: scale(0.97);
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    /* Search & Filter */
    .search-section {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      background: #0b1a1a;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid #1f423b;
    }
    .search-box {
      flex: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #102626;
      padding: 0.5rem 1rem;
      border-radius: 50px;
    }
    .search-box i { color: #2b8c5e; }
    .search-box input {
      background: transparent;
      border: none;
      width: 100%;
      font-size: 1rem;
      outline: none;
      color: white;
    }
    .category-filter select {
      background: #102626;
      border: none;
      padding: 0 1.2rem;
      border-radius: 50px;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }
    /* Product Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: #0f2121;
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      border: 1px solid #2a4942;
      box-shadow: 0 12px 24px -12px rgba(0,0,0,0.5);
    }
    .product-card:hover {
      transform: translateY(-8px);
      border-color: #3cba84;
      box-shadow: 0 24px 36px -12px rgba(43,140,94,0.3);
    }
    .card-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #072020;
      transition: 0.3s;
    }
    .card-content {
      padding: 1.2rem;
    }
    .product-title {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.2px;
    }
    .price {
      color: #6ad4a4;
      font-weight: 800;
      font-size: 1.3rem;
      margin: 8px 0;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .category-badge {
      background: #1e4a3a;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .boost-badge {
      background: #f5b042;
      color: #0a1a1a;
    }
    .rating {
      color: #ffcd4a;
      font-size: 0.8rem;
    }
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #0f1f1f;
      max-width: 550px;
      width: 90%;
      border-radius: 32px;
      padding: 1.8rem;
      border: 1px solid #2b8c5e;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
    }
    .modal-content h2, .modal-content h3 {
      margin-bottom: 1rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      background: #1a3535;
      border: 1px solid #2b6b5a;
      border-radius: 28px;
      color: white;
      font-size: 0.9rem;
    }
    button {
      background: #2b8c5e;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    button.danger {
      background: #c44536;
    }
    .flex-btns {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a2f;
      backdrop-filter: blur(12px);
      padding: 12px 28px;
      border-radius: 60px;
      color: white;
      z-index: 1200;
      font-weight: 500;
      box-shadow: 0 8px 18px black;
      border-left: 4px solid #2b8c5e;
    }
    .skeleton-card {
      background: #102626;
      border-radius: 28px;
      height: 320px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .empty-state {
      text-align: center;
      padding: 3rem;
      background: #0d1f1f;
      border-radius: 48px;
      grid-column: 1/-1;
    }
    /* Seller dashboard & admin tables */
    .dashboard-item {
      background: #0b2626;
      padding: 12px;
      border-radius: 24px;
      margin: 12px 0;
    }
    @media (max-width: 700px) {
      .navbar { flex-direction: column; align-items: stretch; text-align: center; }
      .search-section { flex-direction: column; border-radius: 32px; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo"><i class="fas fa-cubes"></i> DigiMarket</div>
  <div class="nav-group" id="authButtons">
    <button id="loginBtn"><i class="fas fa-key"></i> Login</button>
    <button id="signupBtn"><i class="fas fa-user-plus"></i> Sign Up</button>
  </div>
  <div class="nav-group" id="userMenu" style="display: none;">
    <button id="dashboardBtn"><i class="fas fa-chart-simple"></i> Seller Hub</button>
    <button id="adminPanelBtn" style="display: none;"><i class="fas fa-crown"></i> Admin</button>
    <button id="uploadProductBtn"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
    <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="container">
  <div class="search-section">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search ebooks, templates, music..."></div>
    <div class="category-filter"><select id="categoryFilter"><option value="all">📁 All categories</option><option>ebook</option><option>music</option><option>template</option><option>ai prompts</option><option>course</option><option>zip</option></select></div>
  </div>
  <div id="productsGrid" class="products-grid"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div>
</div>

<!-- MODALS -->
<div id="productModal" class="modal"><div class="modal-content" id="productModalContent"></div></div>
<div id="uploadModal" class="modal"><div class="modal-content"><h3><i class="fas fa-upload"></i> Sell your digital file</h3><form id="uploadForm"><input type="text" id="prodTitle" placeholder="Product title" required><textarea id="prodDesc" placeholder="Full description" rows="2"></textarea><select id="prodCategory"><option>ebook</option><option>music</option><option>template</option><option>ai prompts</option><option>course</option><option>zip</option></select><input type="number" id="prodPrice" placeholder="Price (₦)" required><input type="text" id="sellerWhatsapp" placeholder="WhatsApp number (optional)"><input type="file" id="previewImage" accept="image/*" required><input type="file" id="productFile" accept=".pdf,.zip,.mp3,.docx,.jpg,.png" required><div class="flex-btns"><button type="submit">Publish</button><button type="button" id="closeUploadModal">Cancel</button></div></form></div></div>
<div id="dashboardModal" class="modal"><div class="modal-content" style="max-width:750px;" id="dashboardContent"></div></div>
<div id="adminModal" class="modal"><div class="modal-content" id="adminContent"></div></div>
<div id="authModal" class="modal"><div class="modal-content"><h3 id="authTitle">Access Marketplace</h3><form id="authForm"><input type="text" id="authName" placeholder="Full name" style="display:none"><input type="text" id="authCountry" placeholder="Country" style="display:none"><input type="email" id="authEmail" placeholder="Email address" required><input type="password" id="authPassword" placeholder="Password" required><button type="submit" id="authSubmitBtn">Continue</button><button type="button" id="closeAuthModal">Cancel</button></form></div></div>

<script type="module">
  // --------------------------------- FIREBASE CONFIG (REPLACE WITH YOUR CREDENTIALS) ---------------------------------
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  // !!! IMPORTANT: Replace above with your Firebase project config. Also set Flutterwave public key below !!!
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc, getDoc, setDoc, where, onSnapshot, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const FLW_PUBLIC_KEY = "FLWPUBK_TEST_xxxxxx"; // Replace with your Flutterwave public key

  let currentUser = null;
  let currentUserDoc = null;
  let productsUnsubscribe = null;

  // Helpers
  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-circle-exclamation' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.background = isError ? '#a1352a' : '#1f5e48';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3200);
  }

  async function compressAndUpload(file, path) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = async () => {
          const canvas = document.createElement('canvas');
          let width = img.width, height = img.height;
          const maxSize = 850;
          if (width > maxSize) { height *= maxSize / width; width = maxSize; }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(async (blob) => {
            const storageRef = ref(storage, path);
            await uploadBytes(storageRef, blob);
            const url = await getDownloadURL(storageRef);
            resolve(url);
          }, 'image/jpeg', 0.75);
        };
      };
    });
  }

  // Render marketplace with realtime updates
  function initMarketplaceListener() {
    if (productsUnsubscribe) productsUnsubscribe();
    const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
    productsUnsubscribe = onSnapshot(q, (snapshot) => {
      const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      let filtered = products.filter(p => p.title?.toLowerCase().includes(searchTerm) && (category === 'all' || p.category === category));
      const now = Date.now();
      filtered.sort((a,b) => {
        const aBoost = (a.boostExpiry && a.boostExpiry > now) ? 1 : 0;
        const bBoost = (b.boostExpiry && b.boostExpiry > now) ? 1 : 0;
        if (aBoost !== bBoost) return bBoost - aBoost;
        return (b.createdAt || 0) - (a.createdAt || 0);
      });
      const grid = document.getElementById('productsGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-store-slash fa-3x"></i><h3>No products found</h3><p>Be the first to upload a digital gem ✨</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img class="card-img" src="${p.previewImageUrl || 'https://placehold.co/400x200/1a3333/2b8c5e?text=Preview'}" loading="lazy" onerror="this.src='https://placehold.co/400x200/1a3333/2b8c5e?text=No+Image'">
          <div class="card-content">
            <div class="product-title">${escapeHtml(p.title)}</div>
            <div class="price">₦${p.price.toLocaleString()}</div>
            <div class="meta"><span class="category-badge">${p.category}</span><span class="rating"><i class="fas fa-star"></i> ${(p.ratingAvg || 0).toFixed(1)}</span></div>
            <div class="meta"><small><i class="fas fa-user"></i> ${escapeHtml(p.sellerName)}</small>${p.boostExpiry && p.boostExpiry > Date.now() ? '<span class="category-badge boost-badge"><i class="fas fa-fire"></i> Boosted</span>' : ''}</div>
          </div>
        </div>`).join('');
      document.querySelectorAll('.product-card').forEach(card => card.addEventListener('click', (e) => { e.stopPropagation(); showProductDetail(card.dataset.id); }));
    });
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  async function showProductDetail(productId) {
    const prodSnap = await getDoc(doc(db, 'products', productId));
    if (!prodSnap.exists()) return;
    const prod = prodSnap.data(); prod.id = productId;
    let purchased = false;
    if (currentUser) {
      const purchasesSnap = await getDocs(query(collection(db, 'purchases'), where('productId', '==', productId), where('userId', '==', currentUser.uid)));
      purchased = !purchasesSnap.empty;
    }
    const isSeller = currentUser && prod.sellerId === currentUser.uid;
    const canDownload = purchased || isSeller;
    const modalDiv = document.getElementById('productModalContent');
    modalDiv.innerHTML = `
      <h2>${escapeHtml(prod.title)}</h2>
      <img src="${prod.previewImageUrl}" style="width:100%; border-radius: 24px; margin: 12px 0;">
      <p>${escapeHtml(prod.description) || 'No description'}</p>
      <p><strong>₦${prod.price}</strong> | Category: ${prod.category} | Seller: ${escapeHtml(prod.sellerName)}</p>
      ${prod.sellerWhatsApp ? `<p><i class="fab fa-whatsapp"></i> Contact: ${prod.sellerWhatsApp}</p>` : ''}
      <div class="flex-btns">
        ${!canDownload && currentUser ? `<button id="buyNowBtnAction"><i class="fas fa-shopping-cart"></i> Buy Now (₦${prod.price})</button>` : ''}
        ${canDownload ? `<button id="downloadFileBtn"><i class="fas fa-download"></i> Download File</button>` : ''}
        ${!currentUser ? '<p style="color:#c1cfcb;">Login to purchase this item</p>' : ''}
      </div>
      <div style="margin-top: 20px;"><strong>Rate this product</strong><div id="starRatingWidget">⭐️⭐️⭐️⭐️⭐️</div></div>
      <button id="closeModalDetail" style="margin-top: 20px;">Close</button>
    `;
    document.getElementById('productModal').style.display = 'flex';
    document.getElementById('closeModalDetail').onclick = () => document.getElementById('productModal').style.display = 'none';
    if (!canDownload && currentUser) document.getElementById('buyNowBtnAction')?.addEventListener('click', () => startFlutterwavePayment(prod));
    if (canDownload && document.getElementById('downloadFileBtn')) {
      document.getElementById('downloadFileBtn').onclick = () => { window.open(prod.fileUrl, '_blank'); showToast('Download started'); };
    }
    const starWidget = document.getElementById('starRatingWidget');
    if (starWidget && currentUser && !isSeller) {
      starWidget.innerHTML = [1,2,3,4,5].map(s => `<i class="fas fa-star" data-rate="${s}" style="cursor:pointer; margin:0 2px; color:#666;"></i>`).join('');
      document.querySelectorAll('#starRatingWidget .fa-star').forEach(star => {
        star.addEventListener('click', async (e) => {
          const ratingVal = parseInt(star.dataset.rate);
          const oldAvg = prod.ratingAvg || 0, oldCount = prod.ratingCount || 0;
          const newAvg = (oldAvg * oldCount + ratingVal) / (oldCount + 1);
          await updateDoc(doc(db, 'products', productId), { ratingAvg: newAvg, ratingCount: increment(1) });
          showToast(`Rated ${ratingVal} stars!`);
          document.getElementById('productModal').style.display = 'none';
        });
      });
    }
  }

  async function startFlutterwavePayment(product) {
    if (!window.FlutterwaveCheckout) { showToast("Payment gateway loading, try again", true); return; }
    const tx_ref = `DGM_${Date.now()}_${Math.random().toString(36)}`;
    window.FlutterwaveCheckout({
      public_key: FLW_PUBLIC_KEY,
      tx_ref: tx_ref,
      amount: product.price,
      currency: "NGN",
      payment_options: "card,ussd,transfer",
      customer: { email: currentUser.email, name: currentUserDoc?.name || currentUser.email },
      customizations: { title: product.title, description: "Digital product access", logo: "https://via.placeholder.com/100" },
      callback: async (response) => {
        if (response.status === "successful") {
          await addDoc(collection(db, "purchases"), { productId: product.id, userId: currentUser.uid, transactionId: response.transaction_id, price: product.price, timestamp: Date.now() });
          showToast("Purchase complete! Download unlocked.");
          document.getElementById('productModal').style.display = 'none';
          initMarketplaceListener();
        } else showToast("Payment failed or cancelled", true);
      }
    });
  }

  async function uploadNewProduct(e) {
    e.preventDefault();
    if (!currentUser) return showToast("Login required", true);
    const title = document.getElementById('prodTitle').value;
    const desc = document.getElementById('prodDesc').value;
    const category = document.getElementById('prodCategory').value;
    const price = parseFloat(document.getElementById('prodPrice').value);
    const whatsapp = document.getElementById('sellerWhatsapp').value;
    const previewFile = document.getElementById('previewImage').files[0];
    const productFile = document.getElementById('productFile').files[0];
    if (!previewFile || !productFile) return showToast("Select preview & file", true);
    showToast("Uploading assets...");
    const previewUrl = await compressAndUpload(previewFile, `previews/${Date.now()}_${previewFile.name}`);
    const ext = productFile.name.split('.').pop();
    const productPath = `products/${Date.now()}_${currentUser.uid}.${ext}`;
    const fileRef = ref(storage, productPath);
    await uploadBytes(fileRef, productFile);
    const productURL = await getDownloadURL(fileRef);
    await addDoc(collection(db, "products"), {
      title, description: desc, category, price, sellerWhatsApp: whatsapp, sellerId: currentUser.uid,
      sellerName: currentUserDoc?.name || currentUser.email, previewImageUrl: previewUrl, fileUrl: productURL,
      createdAt: Date.now(), boostExpiry: null, ratingAvg: 0, ratingCount: 0
    });
    showToast("Product live on marketplace!");
    document.getElementById('uploadModal').style.display = 'none';
    document.getElementById('uploadForm').reset();
  }

  // Seller Dashboard & Boost
  async function showSellerDashboard() {
    const productsSnap = await getDocs(query(collection(db, "products"), where("sellerId", "==", currentUser.uid)));
    let totalSales = 0;
    let productList = [];
    for (const docProd of productsSnap.docs) {
      const pData = docProd.data();
      const purchases = await getDocs(query(collection(db, "purchases"), where("productId", "==", docProd.id)));
      const earned = purchases.docs.reduce((sum, pur) => sum + (pur.data().price || 0), 0);
      totalSales += earned;
      productList.push({ id: docProd.id, ...pData, earned });
    }
    const boostOptions = [{amt:100, hours:24},{amt:300, hours:72},{amt:500, hours:168}];
    let boostProductId = null;
    const html = `
      <h3><i class="fas fa-chart-line"></i> Seller Dashboard</h3>
      <p><strong>Total Sales:</strong> ₦${totalSales.toLocaleString()}</p>
      <h4>Your products</h4>
      ${productList.map(p => `<div class="dashboard-item"><b>${escapeHtml(p.title)}</b> | ₦${p.price} | sales: ₦${p.earned}<br>
      <button class="boostBtnSeller" data-id="${p.id}"><i class="fas fa-rocket"></i> Boost</button>
      <button class="deleteProdBtn" data-id="${p.id}">Delete</button></div>`).join('')}
      <div style="margin-top:20px;"><h4>Boost a product</h4><select id="boostDurationSelect"><option value="100">₦100 - 24h boost</option><option value="300">₦300 - 3 days</option><option value="500">₦500 - 7 days</option></select><button id="confirmBoostPay">Pay & Boost selected</button><p id="boostSelectedInfo" style="font-size:12px;">No product selected</p></div>
      <div class="flex-btns"><button id="closeDashBtn">Close</button></div>
    `;
    document.getElementById('dashboardContent').innerHTML = html;
    document.getElementById('dashboardModal').style.display = 'flex';
    document.querySelectorAll('.deleteProdBtn').forEach(btn => btn.addEventListener('click', async (e) => { const pid = btn.dataset.id; if(confirm("Delete product forever?")) { await deleteDoc(doc(db,"products",pid)); showToast("Deleted"); showSellerDashboard(); initMarketplaceListener(); } }));
    document.querySelectorAll('.boostBtnSeller').forEach(btn => btn.addEventListener('click', () => { boostProductId = btn.dataset.id; document.getElementById('boostSelectedInfo').innerText = `Selected product ID: ${boostProductId.substring(0,6)}`; }));
    document.getElementById('confirmBoostPay').onclick = async () => { if (!boostProductId) { showToast("Select a product first", true); return; } const amount = parseInt(document.getElementById('boostDurationSelect').value); startBoostPayment(boostProductId, amount); };
    document.getElementById('closeDashBtn').onclick = () => document.getElementById('dashboardModal').style.display = 'none';
  }

  async function startBoostPayment(productId, amount) {
    if (!window.FlutterwaveCheckout) return showToast("Flutterwave not ready", true);
    window.FlutterwaveCheckout({
      public_key: FLW_PUBLIC_KEY, tx_ref: "BOOST_"+Date.now(), amount, currency: "NGN",
      customer: { email: currentUser.email }, callback: async (resp) => {
        if(resp.status === "successful") {
          let hours = amount === 100 ? 24 : amount === 300 ? 72 : 168;
          const expiry = Date.now() + hours * 3600000;
          await updateDoc(doc(db,"products",productId), { boostExpiry: expiry });
          showToast("Product boosted! appears on top.");
          initMarketplaceListener();
          document.getElementById('dashboardModal').style.display = 'none';
        } else showToast("Boost payment fail", true);
      }
    });
  }

  // Admin Panel
  async function showAdminPanel() {
    const usersSnap = await getDocs(collection(db,"users"));
    const productsSnap = await getDocs(collection(db,"products"));
    let html = `<h3><i class="fas fa-shield-haltered"></i> Admin Console</h3><p>Total users: ${usersSnap.size} | Total products: ${productsSnap.size}</p>
    <h4>All Products</h4><div id="adminProductsList"></div><h4>All Users</h4><div id="adminUsersList"></div><button id="closeAdminBtn">Close</button>`;
    document.getElementById('adminContent').innerHTML = html;
    document.getElementById('adminModal').style.display = 'flex';
    let prodHtml = ''; productsSnap.forEach(d => { prodHtml += `<div class="dashboard-item">${d.data().title} <button class="adminDelProd" data-id="${d.id}">Delete product</button></div>`; });
    document.getElementById('adminProductsList').innerHTML = prodHtml;
    let userHtml = ''; usersSnap.forEach(u => { userHtml += `<div>${u.data().email} (${u.data().name}) <button class="adminDelUser" data-id="${u.id}">Delete user</button></div>`; });
    document.getElementById('adminUsersList').innerHTML = userHtml;
    document.querySelectorAll('.adminDelProd').forEach(btn => btn.addEventListener('click', async (e) => { await deleteDoc(doc(db,"products",btn.dataset.id)); showToast("product removed"); showAdminPanel(); initMarketplaceListener(); }));
    document.querySelectorAll('.adminDelUser').forEach(async (btn) => { btn.addEventListener('click', async () => { await deleteDoc(doc(db,"users",btn.dataset.id)); showToast("user doc deleted"); showAdminPanel(); }); });
    document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminModal').style.display = 'none';
  }

  // Auth UI
  function showAuthModal(mode) {
    document.getElementById('authTitle').innerText = mode === 'login' ? "Welcome Back" : "Join DigiMarket";
    document.getElementById('authName').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('authCountry').style.display = mode === 'signup' ? 'block' : 'none';
    window.authMode = mode;
    document.getElementById('authModal').style.display = 'flex';
  }
  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    try {
      if (window.authMode === 'signup') {
        const name = document.getElementById('authName').value;
        const country = document.getElementById('authCountry').value;
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), { name, country, email, isAdmin: email === "admin@digimarket.com" ? true : false, createdAt: Date.now() });
        showToast("Account created!");
      } else {
        await signInWithEmailAndPassword(auth, email, password);
        showToast("Logged in");
      }
      document.getElementById('authModal').style.display = 'none';
    } catch(err) { showToast(err.message, true); }
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      const udoc = await getDoc(doc(db, "users", user.uid));
      if (udoc.exists()) currentUserDoc = udoc.data();
      else { await setDoc(doc(db, "users", user.uid), { name: user.email.split('@')[0], country: "Global", email: user.email, isAdmin: false }); currentUserDoc = { name: user.email.split('@')[0], isAdmin: false }; }
      document.getElementById('authButtons').style.display = 'none';
      document.getElementById('userMenu').style.display = 'flex';
      if (currentUserDoc?.isAdmin) document.getElementById('adminPanelBtn').style.display = 'inline-block';
    } else {
      document.getElementById('authButtons').style.display = 'flex';
      document.getElementById('userMenu').style.display = 'none';
      currentUserDoc = null;
    }
    initMarketplaceListener();
  });

  // Event Listeners UI
  document.getElementById('searchInput').addEventListener('input', () => initMarketplaceListener());
  document.getElementById('categoryFilter').addEventListener('change', () => initMarketplaceListener());
  document.getElementById('uploadProductBtn').onclick = () => { if(currentUser) document.getElementById('uploadModal').style.display = 'flex'; else showToast("Login to upload", true); };
  document.getElementById('closeUploadModal').onclick = () => document.getElementById('uploadModal').style.display = 'none';
  document.getElementById('uploadForm').addEventListener('submit', uploadNewProduct);
  document.getElementById('dashboardBtn').onclick = () => { if(currentUser) showSellerDashboard(); else showToast("Login first"); };
  document.getElementById('adminPanelBtn').onclick = () => { if(currentUserDoc?.isAdmin) showAdminPanel(); else showToast("Admin only"); };
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); showToast("Logged out"); location.reload(); };
  document.getElementById('loginBtn').onclick = () => showAuthModal('login');
  document.getElementById('signupBtn').onclick = () => showAuthModal('signup');
  document.getElementById('closeAuthModal').onclick = () => document.getElementById('authModal').style.display = 'none';

  // Load Flutterwave SDK
  const script = document.createElement('script');
  script.src = "https://checkout.flutterwave.com/v3.js";
  script.async = true;
  document.head.appendChild(script);
</script>
</body>
</html>
